# Global settings
from_latest_tag = true
ignore_merge_commits = true
tag_prefix = "v"

[bump_profiles.breaking-is-minor]
  breaking_changes_minor_bump = true

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "cognitodemo"
owner = "victormf2"

# Monorepo packages — bump_order respects dependency graph
[packages.a]
path = "a"
include = ["a/**"]
public_api = true
bump_order = 1

[packages.b]
path = "b"
include = ["b/**"]
public_api = true
bump_order = 2

[packages.a.post_bump_hooks]
hooks = [
  "cd a && go mod tidy",
  "git add a/go.mod a/go.sum",
]

[packages.b.post_bump_hooks]
hooks = [
  "cd b && go get github.com/you/b@{{version}}",
  "cd b && go mod tidy",
  "git add b/go.mod b/go.sum",
]

post_bump_hooks = [
  "git push",
  "git push --tags",
]
